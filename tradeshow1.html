// ─── FONT (system sans — reliable in all sandbox environments) ────────────────
const F = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const gmvLabel = v => {
  if (!v) return null;
  if (v >= 20000) return "€" + (v / 1000).toFixed(0) + "k 🔥";
  if (v >= 8000) return "€" + (v / 1000).toFixed(0) + "k ⚡";
  return "€" + (v / 1000).toFixed(1) + "k";
};
const lastContactInfo = d => {
  if (!d) return {
    text: "—",
    color: C.text3
  };
  const days = Math.floor((Date.now() - new Date(d)) / 86400000);
  const text = days === 0 ? "Today" : days === 1 ? "Yesterday" : days + "d ago";
  const color = days <= 30 ? C.green : days <= 90 ? C.amber : C.red;
  return {
    text: d + " (" + text + ")",
    color
  };
};
const STATUS_COLOR = {
  "Active": [C.greenLt, C.green],
  "Lost": [C.redLt, C.red],
  "New": [C.blueLt, C.blue],
  "In Progress": [C.amberLt, C.amber],
  "Prospecting": ["#F0EBF9", "#6A3A9A"],
  "New in Book": [C.blueLt, C.blue],
  "Not Eligible": [C.muted, C.text3]
};
const sc = s => STATUS_COLOR[s] || [C.muted, C.text3];
async function callAI(prompt, tokens) {
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: tokens || 600,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const d = await r.json();
    return (d.content || []).find(b => b.type === "text")?.text || "";
  } catch(e) {
    console.error("AI error:", e);
    return "Error calling AI — please try again.";
  }
}

  <!-- ─── Install prompt (shown to mobile users not yet installed) ─── -->
  <div id="installPrompt">
    <strong>📲 Install Faire BP as an app</strong>
    <span id="installInstructions">Get faster access — works offline, opens fullscreen.</span>
    <div class="row">
      <button class="primary" id="installBtn">Install</button>
      <button id="installDismiss">Not now</button>
    </div>
  </div>

  <script>
    // ─── PWA: service worker registration ─────────────────────────────────────
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(err => console.log("SW registration failed:", err));
      });
    }

    // ─── PWA: install prompt logic ────────────────────────────────────────────
    let deferredPrompt = null;
    const installBox = document.getElementById("installPrompt");
    const installBtn = document.getElementById("installBtn");
    const installDismiss = document.getElementById("installDismiss");
    const installInstructions = document.getElementById("installInstructions");

    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const dismissed = localStorage.getItem("installDismissed");

    // Android / Chrome: capture the native prompt
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredPrompt = e;
      if (!dismissed) installBox.classList.add("visible");
    });

    // iOS: no native prompt, show manual instructions
    if (isIOS && !isStandalone && !dismissed) {
      installInstructions.innerHTML = "Tap <strong>Share</strong> ⬆️ then <strong>Add to Home Screen</strong>.";
      installBtn.style.display = "none";
      installBox.classList.add("visible");
    }

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === "accepted") installBox.classList.remove("visible");
      deferredPrompt = null;
    });

    installDismiss.addEventListener("click", () => {
      installBox.classList.remove("visible");
      localStorage.setItem("installDismissed", "1");
    });

    // Hide if already installed
    window.addEventListener("appinstalled", () => {
      installBox.classList.remove("visible");
      localStorage.setItem("installDismissed", "1");
    });
  </script>
